<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Results Cached — Andor Tech</title>
<style>
  :root{
    --primary:#1a73e8;--success:#188038;--success-bg:#e6f4ea;
    --danger:#c5221f;--text:#202124;--muted:#5f6368;
    --border:#dadce0;--bg:#f8f9fa;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    font-family:"Segoe UI",Arial,sans-serif;
    background:rgba(15,23,42,0.55);
    backdrop-filter:blur(4px);
    display:flex;align-items:center;justify-content:center;
    min-height:100vh;
  }

  .card{
    background:white;border-radius:16px;
    padding:44px 48px;min-width:420px;max-width:500px;
    text-align:center;
    box-shadow:0 24px 64px rgba(0,0,0,0.18);
    animation:popIn .25s ease;
  }
  @keyframes popIn{
    from{transform:scale(.88);opacity:0}
    to  {transform:scale(1);  opacity:1}
  }

  .icon{font-size:52px;margin-bottom:14px;}
  .title{font-size:20px;font-weight:700;color:var(--text);margin-bottom:8px;}
  .subtitle{
    font-size:13px;color:var(--muted);
    margin-bottom:10px;line-height:1.7;
  }
  .files{
    background:var(--success-bg);border:1px solid #b7dfb9;
    border-radius:8px;padding:12px 16px;margin:16px 0 24px 0;
    font-size:13px;color:var(--success);text-align:left;
    line-height:1.8;
  }
  .files span{font-weight:600;}

  .btn-row{display:flex;gap:12px;justify-content:center;}
  .btn{
    flex:1;padding:12px 20px;border-radius:8px;
    font-size:14px;font-weight:600;cursor:pointer;
    border:none;transition:all .15s;
  }
  .btn-cancel{
    background:white;color:var(--text);
    border:1px solid var(--border);
  }
  .btn-cancel:hover{background:var(--bg);}
  .btn-rerun{
    background:var(--primary);color:white;
  }
  .btn-rerun:hover{background:#1557b0;}
  .btn-rerun.loading{background:#9aa0a6;cursor:not-allowed;pointer-events:none;}

  .note{
    margin-top:20px;font-size:11px;color:#9aa0a6;
    border-top:1px solid var(--border);padding-top:14px;
  }
</style>
</head>
<body>
<div class="card">
  <div class="icon">⚡</div>
  <div class="title">Results Already Cached</div>
  <div class="subtitle">
    These exact documents were processed recently.<br>
    The cached result is shown instantly below.
  </div>

  <div class="files">
    📄 <span>SOW:</span> {{ sow_name }}<br>
    🧾 <span>PO:</span>  {{ po_name }}
  </div>

  <div class="btn-row">
    <button class="btn btn-cancel" onclick="useCached()">
      ✅ Use Cached Result
    </button>
    <button class="btn btn-rerun" id="rerunBtn" onclick="reRun()">
      🔄 Re-run Agent
    </button>
  </div>

  <div class="note">
    Cache expires after 30 minutes. Re-run will call the GPU again (~3–5 min).
  </div>
</div>

<script>
  // Passed from server
  const SOW_NAME  = "{{ sow_name }}";
  const PO_NAME   = "{{ po_name }}";
  const CACHE_KEY = "{{ cache_key }}";

  function useCached() {
    // Just close — parent page already has results injected
    if (window.parent && window.parent._onCacheChoice) {
      window.parent._onCacheChoice('use');
    } else {
      window.location.href = '/';
    }
  }

  function reRun() {
    const btn = document.getElementById('rerunBtn');
    btn.textContent = '⏳ Starting…';
    btn.classList.add('loading');

    // Tell parent to force-run bypassing cache
    if (window.parent && window.parent._onCacheChoice) {
      window.parent._onCacheChoice('rerun');
    } else {
      // Standalone fallback
      fetch('/run-force', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ cache_key: CACHE_KEY })
      }).then(() => window.location.href = '/');
    }
  }
</script>
</body>
</html>
